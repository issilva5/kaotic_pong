<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaotic Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a12;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 77, 227, 0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(77, 240, 255, 0.08), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    header { text-align: center; }
    h1 {
      font-size: clamp(36px, 7vw, 64px);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255, 77, 227, 0.5);
    }
    h1 .k { color: #ff4de3; }
    h1 .p { color: #4df0ff; }
    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      letter-spacing: 0.3em;
      color: #888;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
    }
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px 20px;
      background: #11111e;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      color: inherit;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--c1, #ff4de3) 0%, transparent 60%);
      opacity: 0.08;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--c1, #ff4de3);
      box-shadow: 0 8px 30px -10px var(--c1, #ff4de3);
      background: #161628;
    }
    .card:hover::before { opacity: 0.18; }
    .num {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--c1, #ff4de3);
      text-shadow: 0 0 18px var(--c1, #ff4de3);
      line-height: 1;
    }
    .label {
      font-size: 14px;
      letter-spacing: 0.25em;
      color: #aaa;
      text-transform: uppercase;
    }
    .play {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #555;
      text-transform: uppercase;
      transition: color 0.18s ease;
    }
    .card:hover .play { color: var(--c1, #ff4de3); }
    .card.c1 { --c1: #ff4de3; }
    .card.c2 { --c1: #4df0ff; }
    .card.c3 { --c1: #7dff4d; }
    .card.c4 { --c1: #ffe04d; }
    .card.c5 { --c1: #ff4d4d; }
    footer {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: #444;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1><span class="k">Kaotic</span> <span class="p">Pong</span></h1>
      <div class="subtitle">Escolha sua sala</div>
    </header>

    <nav class="grid">
      <a class="card c1" href="sala1.html">
        <div class="num">01</div>
        <div class="label">Sala 1</div>
        <div class="play">Jogar &rarr;</div>
      </a>
      <a class="card c2" href="sala2.html">
        <div class="num">02</div>
        <div class="label">Sala 2</div>
        <div class="play">Jogar &rarr;</div>
      </a>
      <a class="card c3" href="sala3.html">
        <div class="num">03</div>
        <div class="label">Sala 3</div>
        <div class="play">Jogar &rarr;</div>
      </a>
      <a class="card c4" href="sala4.html">
        <div class="num">04</div>
        <div class="label">Sala 4</div>
        <div class="play">Jogar &rarr;</div>
      </a>
      <a class="card c5" href="sala5.html">
        <div class="num">05</div>
        <div class="label">Sala 5</div>
        <div class="play">Jogar &rarr;</div>
      </a>
    </nav>
    <footer>Vibe Coding &middot; Kunumi</footer>
  </div>
</body>
</html>
