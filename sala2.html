<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pong Caótico</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    transition: background 0.15s ease;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 1.4rem;
    letter-spacing: 4px;
    opacity: 0.7;
  }
  #wrap {
    position: relative;
  }
  canvas {
    display: block;
    background: #111;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.04);
  }
  #banner {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%) scale(0.85);
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 0.8rem 2rem;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid currentColor;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    text-shadow: 0 0 12px currentColor;
    white-space: nowrap;
  }
  #banner.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }
  #info {
    margin-top: 12px;
    font-size: 0.8rem;
    opacity: 0.45;
    letter-spacing: 1px;
  }
  #progress {
    margin-top: 14px;
    width: 800px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #progressLabel {
    font-size: 0.75rem;
    letter-spacing: 3px;
    opacity: 0.75;
    text-align: center;
  }
  #progressBar {
    display: flex;
    gap: 3px;
    height: 14px;
  }
  #progressBar .seg {
    flex: 1;
    background: #161616;
    border: 1px solid #262626;
    border-radius: 2px;
    transition: background 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
  }
  #progressBar .seg.lit {
    background: currentColor;
    border-color: currentColor;
    box-shadow: 0 0 10px currentColor;
  }
  #winScreen {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 10, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
    z-index: 10;
  }
  #winScreen.show { display: flex; }
  #winText {
    font-size: 2.4rem;
    letter-spacing: 3px;
  }
  #winScreen button {
    padding: 0.7rem 2rem;
    font-size: 1rem;
    cursor: pointer;
    background: transparent;
    color: #e8e8e8;
    border: 1px solid #555;
    border-radius: 3px;
    font-family: inherit;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  #winScreen button:hover {
    background: #e8e8e8;
    color: #0a0a0a;
  }
</style>
</head>
<body>
<h1>P O N G &nbsp; C A Ó T I C O</h1>
<div id="wrap">
  <canvas id="game" width="800" height="500"></canvas>
  <div id="banner"></div>
  <div id="winScreen">
    <div id="winText"></div>
    <button id="restartBtn">JOGAR NOVAMENTE</button>
  </div>
</div>
<div id="info">↑ ↓ PARA MOVER &nbsp;·&nbsp; PRIMEIRO A 7 VENCE &nbsp;·&nbsp; SOBREVIVA A TODO O CAOS</div>
<div id="progress">
  <div id="progressLabel">CAOS: 0/0</div>
  <div id="progressBar"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const banner = document.getElementById('banner');
  const winScreen = document.getElementById('winScreen');
  const winText = document.getElementById('winText');
  const restartBtn = document.getElementById('restartBtn');
  const progressBar = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');

  const PADDLE_W = 12;
  const PADDLE_H = 80;
  const BASE_BALL_R = 9;
  const PADDLE_SPEED = 7;
  const BASE_BALL_SPEED = 6;
  const WIN_SCORE = 7;
  const MAX_BALL_SPEED = 22;

  let player, cpu, balls, score, keys;
  let invertedControls = false;
  let paddleVisible = true;
  let fieldFlipped = false;
  let gravity = 0;
  let nextPointValue = 1;
  let running = true;
  let lastTime = 0;
  let bannerTimer = null;
  let discoInterval = null;
  let punches = [];
  let impacts = [];
  let blackHoles = [];
  let portals = [];
  let seenEvents = new Set();
  let segments = [];
  let chaosComplete = false;

  function createBall(x, y, vx, vy) {
    return { x, y, vx, vy, r: BASE_BALL_R, frozen: 0, nextVx: null, nextVy: null, portalCooldown: 0 };
  }

  function spawnBall(direction) {
    const angle = (Math.random() - 0.5) * Math.PI / 3;
    const vx = BASE_BALL_SPEED * direction * Math.cos(angle);
    const vy = BASE_BALL_SPEED * Math.sin(angle);
    return createBall(W / 2, H / 2, vx, vy);
  }

  function init() {
    player = { x: 20, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
    cpu = { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
    balls = [spawnBall(Math.random() < 0.5 ? 1 : -1)];
    score = { player: 0, cpu: 0 };
    keys = {};
    invertedControls = false;
    paddleVisible = true;
    fieldFlipped = false;
    gravity = 0;
    nextPointValue = 1;
    running = true;
    punches = [];
    impacts = [];
    blackHoles = [];
    portals = [];
    document.body.style.background = '#0a0a0a';
    winScreen.classList.remove('show');
    if (discoInterval) { clearInterval(discoInterval); discoInterval = null; }
    resetProgress();
  }

  // === BARRA DE PROGRESSO DO CAOS ===
  function buildProgressBar() {
    progressBar.innerHTML = '';
    segments = [];
    chaosEvents.forEach(ev => {
      const seg = document.createElement('div');
      seg.className = 'seg';
      seg.style.color = ev.color;
      seg.title = ev.name();
      progressBar.appendChild(seg);
      segments.push(seg);
    });
    updateProgressLabel();
  }

  function markEventSeen(idx) {
    if (seenEvents.has(idx)) return;
    seenEvents.add(idx);
    if (segments[idx]) segments[idx].classList.add('lit');
    updateProgressLabel();
    if (!chaosComplete && seenEvents.size === chaosEvents.length) {
      chaosComplete = true;
      setTimeout(() => showBanner('CAOS COMPLETO!', '#fffa65'), 1500);
    }
  }

  function updateProgressLabel() {
    progressLabel.textContent = `CAOS: ${seenEvents.size}/${chaosEvents.length}`;
  }

  function resetProgress() {
    seenEvents.clear();
    chaosComplete = false;
    segments.forEach(s => s.classList.remove('lit'));
    updateProgressLabel();
  }

  // === LUVA DE BOXE ===
  function spawnPunch() {
    if (balls.length === 0) return;
    const target = balls[Math.floor(Math.random() * balls.length)];
    const approachAngle = Math.random() * Math.PI * 2;
    const dist = 260;
    const startX = target.x + Math.cos(approachAngle) * dist;
    const startY = target.y + Math.sin(approachAngle) * dist;
    punches.push({
      phase: 'incoming',
      t: 0,
      duration: 0.2,
      startX, startY,
      x: startX, y: startY,
      rotation: Math.atan2(target.y - startY, target.x - startX),
      ball: target,
      done: false
    });
  }

  function updatePunches(dt) {
    for (const p of punches) {
      p.t += dt;
      const u = Math.min(1, p.t / p.duration);
      if (p.phase === 'incoming') {
        // Persegue a bola
        let tx, ty;
        if (balls.includes(p.ball)) {
          tx = p.ball.x;
          ty = p.ball.y;
        } else {
          tx = p.x;
          ty = p.y;
        }
        const e = 1 - Math.pow(1 - u, 3);
        p.x = p.startX + (tx - p.startX) * e;
        p.y = p.startY + (ty - p.startY) * e;
        p.rotation = Math.atan2(ty - p.startY, tx - p.startX);
        if (u >= 1) {
          if (balls.includes(p.ball)) {
            const dx = p.ball.x - p.startX;
            const dy = p.ball.y - p.startY;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const power = 18;
            const variance = (Math.random() - 0.5) * 0.3;
            const baseAngle = Math.atan2(dy, dx) + variance;
            p.ball.vx = Math.cos(baseAngle) * power;
            p.ball.vy = Math.sin(baseAngle) * power;
            impacts.push({ x: p.ball.x, y: p.ball.y, t: 0, duration: 0.35 });
          }
          p.phase = 'recoil';
          p.t = 0;
          p.duration = 0.18;
          p.recoilFromX = p.x;
          p.recoilFromY = p.y;
        }
      } else if (p.phase === 'recoil') {
        const e = u;
        p.x = p.recoilFromX + (p.startX - p.recoilFromX) * e;
        p.y = p.recoilFromY + (p.startY - p.recoilFromY) * e;
        if (u >= 1) p.done = true;
      }
    }
    punches = punches.filter(p => !p.done);

    for (const i of impacts) i.t += dt;
    impacts = impacts.filter(i => i.t < i.duration);
  }

  function drawGlove(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);

    // Punho (branco com listras vermelhas)
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(-32, -18, 18, 36);
    ctx.fillStyle = '#d63031';
    ctx.fillRect(-32, -18, 18, 5);
    ctx.fillRect(-32, 13, 18, 5);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.strokeRect(-32, -18, 18, 36);

    // Corpo da luva (vermelho, em frente ao punho)
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.ellipse(-2, 0, 24, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Polegar
    ctx.fillStyle = '#d63031';
    ctx.beginPath();
    ctx.ellipse(-6, 18, 9, 11, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Vinco dos dedos
    ctx.beginPath();
    ctx.moveTo(12, -14);
    ctx.quadraticCurveTo(6, 0, 12, 14);
    ctx.stroke();

    // Brilho
    ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
    ctx.beginPath();
    ctx.ellipse(-4, -10, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawImpact(i) {
    const u = i.t / i.duration;
    const r = 8 + u * 50;
    const alpha = 1 - u;
    ctx.strokeStyle = `rgba(255, 200, 50, ${alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(i.x, i.y, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // === BURACO NEGRO ===
  function spawnBlackHole() {
    blackHoles.push({
      x: W / 2 + (Math.random() - 0.5) * 240,
      y: H / 2 + (Math.random() - 0.5) * 240,
      t: 0,
      duration: 3,
      radius: 32,
      strength: 90000
    });
  }

  function updateBlackHoles(dt) {
    for (const bh of blackHoles) {
      bh.t += dt;
      for (const ball of balls) {
        if (ball.frozen > 0) continue;
        const dx = bh.x - ball.x;
        const dy = bh.y - ball.y;
        const distSq = dx * dx + dy * dy;
        const dist = Math.sqrt(distSq);
        if (dist < 6) continue;
        const accel = Math.min(50, bh.strength / Math.max(distSq, 2500));
        ball.vx += (dx / dist) * accel * dt;
        ball.vy += (dy / dist) * accel * dt;
      }
    }
    blackHoles = blackHoles.filter(bh => bh.t < bh.duration);
  }

  function drawBlackHole(bh) {
    const u = bh.t / bh.duration;
    const alpha = u < 0.15 ? u / 0.15 : (u > 0.85 ? (1 - u) / 0.15 : 1);
    const rot = bh.t * 4;

    // Disco de acresção
    const grad = ctx.createRadialGradient(bh.x, bh.y, 0, bh.x, bh.y, bh.radius * 3.2);
    grad.addColorStop(0, `rgba(0, 0, 0, ${alpha})`);
    grad.addColorStop(0.25, `rgba(60, 0, 100, ${alpha * 0.7})`);
    grad.addColorStop(0.55, `rgba(140, 50, 200, ${alpha * 0.35})`);
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.radius * 3.2, 0, Math.PI * 2);
    ctx.fill();

    // Anéis rodando
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = `rgba(200, 120, 255, ${alpha * (0.7 - i * 0.18)})`;
      ctx.beginPath();
      const r = bh.radius * (0.95 + i * 0.35);
      ctx.arc(bh.x, bh.y, r, rot + i * 1.2, rot + i * 1.2 + Math.PI * 1.4);
      ctx.stroke();
    }

    // Horizonte de eventos
    ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.radius * 0.65, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(255, 180, 255, ${alpha * 0.9})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // === PORTAIS ===
  function spawnPortals() {
    const margin = 110;
    const p1 = {
      x: margin + Math.random() * (W / 2 - margin - 40),
      y: margin + Math.random() * (H - margin * 2),
      color: '#3aa0ff',
      t: 0,
      duration: 5,
      radius: 30
    };
    const p2 = {
      x: W / 2 + 40 + Math.random() * (W / 2 - margin - 40),
      y: margin + Math.random() * (H - margin * 2),
      color: '#ff9020',
      t: 0,
      duration: 5,
      radius: 30
    };
    p1.pair = p2;
    p2.pair = p1;
    portals.push(p1, p2);
  }

  function updatePortals(dt) {
    for (const p of portals) p.t += dt;

    for (const ball of balls) {
      if (ball.portalCooldown > 0) {
        ball.portalCooldown -= dt;
        continue;
      }
      for (const p of portals) {
        const dx = ball.x - p.x;
        const dy = ball.y - p.y;
        if (dx * dx + dy * dy < p.radius * p.radius) {
          ball.x = p.pair.x;
          ball.y = p.pair.y;
          ball.portalCooldown = 0.35;
          break;
        }
      }
    }

    portals = portals.filter(p => p.t < p.duration);
  }

  function drawPortal(p) {
    const u = p.t / p.duration;
    const alpha = u < 0.12 ? u / 0.12 : (u > 0.88 ? (1 - u) / 0.12 : 1);
    const rot = p.t * 2.8;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;

    // Glow externo
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 18;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Espiral interna
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      ctx.globalAlpha = alpha * (0.4 + i * 0.15);
      ctx.beginPath();
      const r = p.radius * (0.3 + i * 0.18);
      const start = i * Math.PI / 2;
      ctx.arc(0, 0, r, start, start + Math.PI * 1.4);
      ctx.stroke();
    }

    // Núcleo
    ctx.globalAlpha = alpha * 0.35;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(0, 0, p.radius * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // === EVENTOS DE CAOS ===
  // Cada evento: { name, color, apply }
  // Para adicionar um novo: basta pushar um objeto neste array.
  const chaosEvents = [
    {
      name: () => Math.random() < 0.5 ? 'BOLA ENORME' : 'BOLA MINÚSCULA',
      color: '#ff6b6b',
      weight: 14,
      apply: () => {
        const big = Math.random() < 0.5;
        balls.forEach(b => b.r = big ? 26 : 4);
        setTimeout(() => balls.forEach(b => b.r = BASE_BALL_R), 5000);
      }
    },
    {
      name: () => 'GRAVIDADE!',
      color: '#9c88ff',
      weight: 12,
      apply: () => {
        gravity = 0.28;
        setTimeout(() => gravity = 0, 5000);
      }
    },
    {
      name: () => 'TURBO! 2x',
      color: '#ff4757',
      weight: 15,
      apply: () => {
        balls.forEach(b => { b.vx *= 2; b.vy *= 2; });
      }
    },
    {
      name: () => 'RAQUETES INVISÍVEIS',
      color: '#2ed573',
      weight: 10,
      apply: () => {
        paddleVisible = false;
        setTimeout(() => paddleVisible = true, 3000);
      }
    },
    {
      name: () => 'MUNDO INVERTIDO',
      color: '#eccc68',
      weight: 10,
      apply: () => {
        fieldFlipped = true;
        setTimeout(() => fieldFlipped = false, 5000);
      }
    },
    {
      name: () => 'DUAS BOLAS!',
      color: '#ff6348',
      weight: 11,
      apply: () => {
        const original = balls[0];
        const newBall = createBall(
          original.x, original.y,
          -original.vx,
          original.vy + (Math.random() - 0.5) * 3
        );
        balls.push(newBall);
        setTimeout(() => {
          if (balls.length > 1) balls = balls.slice(0, 1);
        }, 5000);
      }
    },
    {
      name: () => 'MURRO!',
      color: '#d63031',
      weight: 13,
      apply: () => {
        spawnPunch();
      }
    },
    {
      name: () => 'BURACO NEGRO',
      color: '#b56cff',
      weight: 7,
      apply: () => {
        spawnBlackHole();
      }
    },
    {
      name: () => 'PORTAIS',
      color: '#3aa0ff',
      weight: 8,
      apply: () => {
        spawnPortals();
      }
    }
  ];

  function triggerChaos() {
    const ev = pickWeightedEvent();
    ev.apply();
    showBanner(ev.name(), ev.color);
    markEventSeen(chaosEvents.indexOf(ev));
  }

  function pickWeightedEvent() {
    const total = chaosEvents.reduce((s, e) => s + (e.weight || 1), 0);
    let r = Math.random() * total;
    for (const ev of chaosEvents) {
      r -= (ev.weight || 1);
      if (r <= 0) return ev;
    }
    return chaosEvents[chaosEvents.length - 1];
  }

  function showBanner(text, color) {
    banner.textContent = text;
    banner.style.color = color;
    banner.classList.add('show');
    if (bannerTimer) clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => banner.classList.remove('show'), 1400);
  }

  // === INPUT ===
  document.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (['ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });
  restartBtn.addEventListener('click', () => { init(); });

  // === UPDATE ===
  function updatePlayer() {
    const up = invertedControls ? keys['ArrowDown'] : keys['ArrowUp'];
    const down = invertedControls ? keys['ArrowUp'] : keys['ArrowDown'];
    if (up) player.y -= PADDLE_SPEED;
    if (down) player.y += PADDLE_SPEED;
    player.y = Math.max(0, Math.min(H - player.h, player.y));
  }

  function updateCPU() {
    // Mira a bola mais próxima que está vindo na direção da CPU.
    let target = null;
    let minDist = Infinity;
    for (const b of balls) {
      if (b.vx > 0) {
        const dist = cpu.x - b.x;
        if (dist > 0 && dist < minDist) {
          minDist = dist;
          target = b;
        }
      }
    }
    if (!target) target = balls[0];
    if (!target) return;

    const centerY = cpu.y + cpu.h / 2;
    const diff = target.y - centerY;
    // Dificuldade moderada: velocidade um pouco menor que a do player
    // e dead zone para a CPU não ficar tremendo.
    const cpuSpeed = PADDLE_SPEED * 0.72;
    if (Math.abs(diff) > 8) {
      cpu.y += Math.sign(diff) * cpuSpeed;
    }
    cpu.y = Math.max(0, Math.min(H - cpu.h, cpu.y));
  }

  function reflectFromPaddle(b, paddle, fromLeft) {
    const hitPos = (b.y - (paddle.y + paddle.h / 2)) / (paddle.h / 2);
    const clamped = Math.max(-1, Math.min(1, hitPos));
    const speed = Math.min(MAX_BALL_SPEED, Math.sqrt(b.vx * b.vx + b.vy * b.vy));
    const angle = clamped * (Math.PI / 4);
    b.vx = (fromLeft ? 1 : -1) * Math.abs(speed * Math.cos(angle));
    b.vy = speed * Math.sin(angle);
  }

  function updateBalls(dt) {
    const remaining = [];
    for (const b of balls) {
      if (b.frozen > 0) {
        b.frozen -= dt;
        if (b.frozen <= 0 && b.nextVx !== null) {
          b.vx = b.nextVx;
          b.vy = b.nextVy;
          b.nextVx = null;
          b.nextVy = null;
        }
        remaining.push(b);
        continue;
      }

      b.vy += gravity;
      b.x += b.vx;
      b.y += b.vy;

      // Paredes
      if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); }
      if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy); }

      // Raquete do player
      if (b.vx < 0 &&
          b.x - b.r < player.x + player.w &&
          b.x + b.r > player.x &&
          b.y > player.y && b.y < player.y + player.h) {
        b.x = player.x + player.w + b.r;
        reflectFromPaddle(b, player, true);
        triggerChaos();
      }

      // Raquete da CPU
      if (b.vx > 0 &&
          b.x + b.r > cpu.x &&
          b.x - b.r < cpu.x + cpu.w &&
          b.y > cpu.y && b.y < cpu.y + cpu.h) {
        b.x = cpu.x - b.r;
        reflectFromPaddle(b, cpu, false);
        triggerChaos();
      }

      // Limite de velocidade (impede o turbo de explodir)
      const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (speed > MAX_BALL_SPEED) {
        b.vx = (b.vx / speed) * MAX_BALL_SPEED;
        b.vy = (b.vy / speed) * MAX_BALL_SPEED;
      }

      // Pontuação
      if (b.x < -40) {
        score.cpu += nextPointValue;
        nextPointValue = 1;
        continue;
      }
      if (b.x > W + 40) {
        score.player += nextPointValue;
        nextPointValue = 1;
        continue;
      }

      remaining.push(b);
    }

    if (remaining.length === 0) {
      balls = [spawnBall(Math.random() < 0.5 ? 1 : -1)];
    } else {
      balls = remaining;
    }
  }

  function checkWin() {
    if (score.player >= WIN_SCORE || score.cpu >= WIN_SCORE) {
      running = false;
      const playerWon = score.player >= WIN_SCORE;
      winText.textContent = playerWon ? 'VOCÊ VENCEU' : 'A CPU VENCEU';
      winText.style.color = playerWon ? '#2ed573' : '#ff4757';
      winScreen.classList.add('show');
    }
  }

  // === RENDER ===
  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    if (fieldFlipped) {
      ctx.translate(W, H);
      ctx.scale(-1, -1);
    }

    // Linha do meio
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 12]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Placar
    ctx.fillStyle = '#666';
    ctx.font = 'bold 56px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(score.player, W / 2 - 70, 70);
    ctx.fillText(score.cpu, W / 2 + 70, 70);

    if (nextPointValue > 1) {
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('PRÓXIMO x' + nextPointValue, W / 2, 95);
    }

    // Raquetes
    if (paddleVisible) {
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillRect(cpu.x, cpu.y, cpu.w, cpu.h);
    }

    // Buracos negros (atrás da bola)
    for (const bh of blackHoles) drawBlackHole(bh);

    // Portais (atrás da bola)
    for (const p of portals) drawPortal(p);

    // Bolas
    for (const b of balls) {
      ctx.fillStyle = b.frozen > 0 ? '#feca57' : '#f0f0f0';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Impactos de murro
    for (const i of impacts) drawImpact(i);

    // Luvas de boxe
    for (const p of punches) drawGlove(p);

    ctx.restore();
  }

  // === LOOP ===
  function loop(time) {
    const dt = lastTime ? Math.min(0.05, (time - lastTime) / 1000) : 0;
    lastTime = time;

    if (running) {
      updatePlayer();
      updateCPU();
      updateBlackHoles(dt);
      updateBalls(dt);
      updatePortals(dt);
      updatePunches(dt);
      checkWin();
    }
    draw();
    requestAnimationFrame(loop);
  }

  buildProgressBar();
  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
