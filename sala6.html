<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS PONG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060a;
    --grid:#101526;
    --p1:#00f0ff;
    --p2:#ff2bd6;
    --ball:#fff75e;
    --glow1:0 0 12px rgba(0,240,255,.9);
    --glow2:0 0 12px rgba(255,43,214,.9);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Major Mono Display',monospace;color:#e8ecff}
  body{
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 20% 10%, rgba(0,240,255,.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,43,214,.08), transparent 40%),
      var(--bg);
  }
  #wrap{position:relative;width:min(96vw,960px);aspect-ratio:16/10}
  canvas{
    width:100%;height:100%;display:block;border-radius:10px;
    background:#070912;
    box-shadow:0 0 0 2px #1a2238, 0 0 60px rgba(0,240,255,.12), 0 0 80px rgba(255,43,214,.1);
    image-rendering:pixelated;
  }
  /* scanline + grain overlay */
  #wrap::after{
    content:"";position:absolute;inset:0;border-radius:10px;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;opacity:.5;
  }
  #hud{
    position:absolute;top:10px;left:0;right:0;display:flex;justify-content:center;gap:48px;
    font-family:'Press Start 2P',monospace;pointer-events:none;
  }
  .score{font-size:clamp(18px,4vw,34px);letter-spacing:1px}
  .s1{color:var(--p1);text-shadow:var(--glow1)}
  .s2{color:var(--p2);text-shadow:var(--glow2)}
  #banner{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;pointer-events:none;
  }
  #event-name{
    font-family:'Press Start 2P',monospace;font-size:clamp(14px,3.4vw,28px);
    color:#fff;text-shadow:0 0 18px #fff75e,0 0 40px #ff2bd6;opacity:0;
    transform:scale(.6);transition:none;padding:0 12px;line-height:1.6;
  }
  #event-name.show{animation:pop 1.6s cubic-bezier(.2,1.4,.3,1) forwards}
  @keyframes pop{
    0%{opacity:0;transform:scale(.4) rotate(-6deg)}
    18%{opacity:1;transform:scale(1.12) rotate(2deg)}
    34%{transform:scale(1) rotate(0)}
    78%{opacity:1}
    100%{opacity:0;transform:scale(1.05)}
  }
  #start,#over{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(5,6,10,.82);backdrop-filter:blur(4px);border-radius:10px;text-align:center;padding:24px;z-index:5;
  }
  #over{display:none}
  .title{
    font-family:'Press Start 2P',monospace;font-size:clamp(22px,6vw,52px);line-height:1.4;
    background:linear-gradient(90deg,var(--p1),#fff75e,var(--p2));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 16px rgba(255,43,214,.4));margin-bottom:6px;
  }
  .sub{font-size:clamp(11px,2.4vw,15px);opacity:.85;margin:14px 0 26px;max-width:520px;line-height:1.9}
  .keys{display:flex;gap:40px;flex-wrap:wrap;justify-content:center;font-size:clamp(10px,2.2vw,13px);opacity:.9;margin-bottom:28px}
  .keys b{color:var(--ball)}
  .btn{
    font-family:'Press Start 2P',monospace;font-size:clamp(12px,2.6vw,16px);
    color:#05060a;background:linear-gradient(90deg,var(--p1),var(--p2));
    border:none;padding:16px 30px;border-radius:8px;cursor:pointer;letter-spacing:1px;
    box-shadow:0 0 24px rgba(0,240,255,.4);transition:transform .12s, box-shadow .2s;
  }
  .btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 0 40px rgba(255,43,214,.6)}
  .mode{display:flex;gap:10px;margin-bottom:20px}
  .mode button{
    font-family:'Major Mono Display',monospace;font-size:13px;color:#cdd6ff;background:#0e1322;
    border:1px solid #233052;padding:10px 16px;border-radius:7px;cursor:pointer;transition:.15s;
  }
  .mode button.active{border-color:var(--p1);color:#fff;box-shadow:var(--glow1)}
  #win{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,30px);margin-bottom:18px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="score s1" id="sc1">0</div>
    <div class="score s2" id="sc2">0</div>
  </div>
  <div id="banner"><div id="event-name"></div></div>

  <div id="start">
    <div class="title">CHAOS<br>PONG</div>
    <div class="sub">classic pong, until the ball hits a paddle. then reality breaks. multiball, mutating paddles, gravity, the ball turning into the word KUNUMI, and a dozen other glitches. it never ends &mdash; just rack up points and survive the chaos.</div>
    <div class="mode" id="mode">
      <button data-m="ai" class="active">P1 vs CPU</button>
      <button data-m="2p">P1 vs P2</button>
    </div>
    <div class="keys">
      <div>player 1 &mdash; <b>W</b> / <b>S</b></div>
      <div id="p2keys">cpu</div>
    </div>
    <button class="btn" id="startBtn">START CHAOS</button>
  </div>
</div>

<script>
(()=>{
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const sc1El=document.getElementById('sc1'),sc2El=document.getElementById('sc2');
const evEl=document.getElementById('event-name');
const startScreen=document.getElementById('start');

// logical resolution
const W=960,H=600;
function resize(){const r=window.devicePixelRatio||1;cv.width=W*r;cv.height=H*r;ctx.setTransform(r,0,0,r,0,0);}
cv.width=W;cv.height=H;resize();addEventListener('resize',resize);

const MAX_BALLS=12;let mode='ai';
let running=false;

// ---- game state ----
let paddles, balls, score, shake, gravity, gravityT, invert, reverseCtrl, t, firstChaos;
const PAD_W=14, PAD_H_BASE=110, PAD_MARGIN=26;

function freshPaddle(side){
  return {
    side, x: side==='l'?PAD_MARGIN:W-PAD_MARGIN-PAD_W,
    y:H/2-PAD_H_BASE/2, w:PAD_W, h:PAD_H_BASE,
    targetH:PAD_H_BASE, vy:0, drift:0
  };
}
function makeBall(x,y,sp,ang,opts={}){
  return Object.assign({
    x,y,r:9, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
    text:null, invisible:false, ghostT:0, big:false, color:'var',
    trail:[]
  },opts);
}
function launchBall(dir){
  const ang=(Math.random()*0.6-0.3) + (dir<0?Math.PI:0);
  return makeBall(W/2,H/2,6,ang);
}

function reset(full){
  paddles={l:freshPaddle('l'),r:freshPaddle('r')};
  balls=[launchBall(Math.random()<.5?1:-1)];
  if(full) score={l:0,r:0};
  shake=0;gravity=0;gravityT=0;invert=0;reverseCtrl=0;t=0;firstChaos=true;
  updateHud();
}

function updateHud(){sc1El.textContent=score.l;sc2El.textContent=score.r;}

// ---- input ----
const keys={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// ---- chaos events ----
const COLORS=['#00f0ff','#ff2bd6','#fff75e','#7CFF6B','#ff7b00','#b16bff'];
function rc(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

const EVENTS=[
  {name:'MULTIBALL!!',fn:()=>{
    const n=3+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      if(balls.length>=MAX_BALLS)break;
      const a=Math.random()*Math.PI*2;
      balls.push(makeBall(W/2,H/2,5+Math.random()*3,a,{color:rc()}));
    }
  }},
  {name:'THE BALL IS KUNUMI',fn:()=>{
    balls.forEach(b=>{b.text='KUNUMI';b.r=16;});
  }},
  {name:'GIANT BALL',fn:()=>{
    balls.forEach(b=>{b.r=Math.min(b.r*3.2,46);b.big=true;});
  }},
  {name:'TINY PADDLES',fn:()=>{
    paddles.l.targetH=44;paddles.r.targetH=44;
  }},
  {name:'HUGE PADDLES',fn:()=>{
    paddles.l.targetH=240;paddles.r.targetH=240;
  }},
  {name:'TURBO BALL',fn:()=>{
    balls.forEach(b=>{const s=Math.hypot(b.vx,b.vy)*1.9;const a=Math.atan2(b.vy,b.vx);b.vx=Math.cos(a)*s;b.vy=Math.sin(a)*s;});
  }},
  {name:'GRAVITY ON',fn:()=>{gravity=0.22;gravityT=600;}},
  {name:'GHOST BALL',fn:()=>{balls.forEach(b=>b.ghostT=600);}},
  {name:'REVERSE CONTROLS',fn:()=>{reverseCtrl=520;}},
  {name:'COLORS INVERTED',fn:()=>{invert=520;}},
  {name:'EARTHQUAKE',fn:()=>{shake=46;}},
  {name:'PADDLES POSSESSED',fn:()=>{
    paddles.l.drift=420;paddles.r.drift=420;
  }},
  {name:'SPLIT THE BALL',fn:()=>{
    const cur=[...balls];
    cur.forEach(b=>{
      if(balls.length>=MAX_BALLS)return;
      const a=Math.atan2(b.vy,b.vx),s=Math.hypot(b.vx,b.vy);
      b.vx=Math.cos(a-0.5)*s;b.vy=Math.sin(a-0.5)*s;
      balls.push(makeBall(b.x,b.y,s,a+0.5,{color:rc(),text:b.text,r:b.r}));
    });
  }},
  {name:'RAINBOW PUKE',fn:()=>{balls.forEach(b=>b.color='rainbow');}},
];

function triggerChaos(){
  let e;
  if(firstChaos){
    e=EVENTS.find(ev=>ev.name==='THE BALL IS KUNUMI');
    firstChaos=false;
  }else{
    e=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  }
  e.fn();
  evEl.textContent=e.name;
  evEl.classList.remove('show');void evEl.offsetWidth;evEl.classList.add('show');
}

// ---- scoring ----
function awardPoint(who){
  score[who]++;updateHud();
}

// ---- physics / update ----
function update(){
  t++;
  if(reverseCtrl>0)reverseCtrl--;
  if(invert>0)invert--;
  if(gravityT>0){gravityT--;if(gravityT===0)gravity=0;}
  if(shake>0)shake*=0.9;

  // paddle sizing lerp
  for(const k of ['l','r']){
    const p=paddles[k];
    p.h += (p.targetH-p.h)*0.12;
    const cy=p.y+p.h/2; // keep centered while resizing
  }

  // PLAYER 1
  const sp=8.5, rev=reverseCtrl>0?-1:1;
  let m1=0;
  if(keys['w'])m1-=1;if(keys['s'])m1+=1;
  paddles.l.y += m1*sp*rev;

  // PLAYER 2 / AI
  if(mode==='2p'){
    let m2=0;
    if(keys['arrowup'])m2-=1;if(keys['arrowdown'])m2+=1;
    paddles.r.y += m2*sp*rev;
  } else {
    // AI: track nearest incoming ball
    let target=H/2, best=Infinity;
    for(const b of balls){
      if(b.vx>0){const d=Math.abs(b.x-paddles.r.x);if(d<best){best=d;target=b.y;}}
    }
    if(best===Infinity && balls[0])target=balls[0].y;
    const c=paddles.r.y+paddles.r.h/2;
    const diff=target-c;
    paddles.r.y += Math.max(-7,Math.min(7,diff*0.11));
  }

  // possessed drift
  for(const k of ['l','r']){
    const p=paddles[k];
    if(p.drift>0){p.drift--;p.y+=Math.sin(t*0.2+(k==='l'?0:2))* (1.6+Math.random());}
    p.y=Math.max(0,Math.min(H-p.h,p.y));
  }

  // balls
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    if(gravity)b.vy+=gravity;
    if(b.ghostT>0){b.ghostT--;b.invisible=(Math.floor(t/14)%2===0);}else b.invisible=false;

    b.trail.push({x:b.x,y:b.y});if(b.trail.length>8)b.trail.shift();
    b.x+=b.vx;b.y+=b.vy;

    // top/bottom
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy);}
    if(b.y+b.r>H){b.y=H-b.r;b.vy=-Math.abs(b.vy);}

    // paddle collide
    const L=paddles.l,R=paddles.r;
    if(b.vx<0 && b.x-b.r<L.x+L.w && b.x-b.r>L.x-20 && b.y>L.y && b.y<L.y+L.h){
      b.x=L.x+L.w+b.r;
      const rel=(b.y-(L.y+L.h/2))/(L.h/2);
      bounce(b,1,rel);
    }
    if(b.vx>0 && b.x+b.r>R.x && b.x+b.r<R.x+R.w+20 && b.y>R.y && b.y<R.y+R.h){
      b.x=R.x-b.r;
      const rel=(b.y-(R.y+R.h/2))/(R.h/2);
      bounce(b,-1,rel);
    }

    // side walls: reflect the ball back AND award a point (ball stays in play)
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);awardPoint('r');shake=Math.max(shake,14);}
    else if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);awardPoint('l');shake=Math.max(shake,14);}
  }
  // safety: if all balls gone, score for last hitter — fallback respawn
  if(balls.length===0){balls=[launchBall(1)];}
}

function bounce(b,dir,rel){
  const speed=Math.min(Math.hypot(b.vx,b.vy)*1.04, 22);
  const ang=rel*0.9; // -0.9..0.9 rad
  b.vx=dir*Math.cos(ang)*speed;
  b.vy=Math.sin(ang)*speed;
  shake=Math.max(shake,8);
  triggerChaos();
}

// ---- render ----
function draw(){
  ctx.save();
  const sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
  ctx.translate(sx,sy);

  // bg
  ctx.fillStyle=invert>0?'#f4f1ff':'#070912';
  ctx.fillRect(-30,-30,W+60,H+60);

  // grid glow
  ctx.strokeStyle=invert>0?'rgba(0,0,0,.06)':'rgba(40,60,110,.25)';
  ctx.lineWidth=1;
  for(let x=0;x<=W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // center dashed line
  ctx.setLineDash([10,16]);ctx.lineWidth=3;
  ctx.strokeStyle=invert>0?'rgba(0,0,0,.2)':'rgba(120,160,255,.35)';
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  // paddles
  drawPaddle(paddles.l, invert>0?'#ff2bd6':'#00f0ff');
  drawPaddle(paddles.r, invert>0?'#00f0ff':'#ff2bd6');

  // balls
  for(const b of balls)drawBall(b);

  ctx.restore();
  requestAnimationFrame(loop);
}

function drawPaddle(p,col){
  ctx.save();
  ctx.shadowColor=col;ctx.shadowBlur=20;
  ctx.fillStyle=col;
  roundRect(p.x,p.y,p.w,p.h,7);ctx.fill();
  ctx.restore();
}

function drawBall(b){
  if(b.invisible)return;
  ctx.save();
  let col;
  if(b.color==='rainbow')col=`hsl(${(t*6)%360},100%,60%)`;
  else if(b.color==='var')col=(invert>0?'#1a1130':'#fff75e');
  else col=b.color;

  // trail
  for(let i=0;i<b.trail.length;i++){
    const tp=b.trail[i],a=i/b.trail.length;
    ctx.globalAlpha=a*0.4;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(tp.x,tp.y,b.r*a*0.9,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.shadowColor=col;ctx.shadowBlur=22;

  if(b.text){
    ctx.fillStyle=col;
    ctx.font=`900 ${b.r*1.6}px 'Press Start 2P', monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    // wobble rotation for chaos
    ctx.translate(b.x,b.y);ctx.rotate(Math.sin(t*0.1)*0.18);
    ctx.fillText(b.text,0,0);
  }else{
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

// ---- loop ----
function loop(){
  if(running)update();
  draw();
}

// ---- ui ----
document.querySelectorAll('#mode button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('#mode button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');mode=btn.dataset.m;
    document.getElementById('p2keys').innerHTML = mode==='2p' ? 'player 2 &mdash; <b>&uarr;</b> / <b>&darr;</b>' : 'cpu';
  };
});
document.getElementById('startBtn').onclick=()=>{
  reset(true);running=true;startScreen.style.display='none';
};

reset(true);running=false;loop();
})();
</script>
</body>
</html>
